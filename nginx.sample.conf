#
# wp-boilerplate.test
#   Modern local/sample Nginx virtual host for a Composer-managed WordPress seat
#
# Expected local/Docker project layout:
#
#   /var/www/nginx_sites/wp-boilerplate.test/public/index.php
#   /var/www/nginx_sites/wp-boilerplate.test/public/wp/       # WordPress core from Composer
#   /var/www/nginx_sites/wp-boilerplate.test/public/content/  # custom wp-content directory
#
# Production layout note:
#
#   If the deployed repository lives inside an httpdocs directory, the Nginx
#   root must point to that nested public directory:
#
#     root /var/www/servers/example.com/httpdocs/public;
#
#   Do not point Nginx at:
#
#     /var/www/servers/example.com/public
#
#   unless that directory actually contains index.php.
#
# Notes:
#
# - WordPress is served from /public.
# - WordPress core lives in /public/wp.
# - wp-content is replaced by /public/content.
# - Yoast sitemap rewrites are included below, commented out by default.
# - For production HTTPS, run Certbot against the real domain and let it append
#   the SSL listen/certificate directives.
#

server {
    listen 80;
    listen [::]:80;

    server_name www.wp-boilerplate.test;

    return 301 http://wp-boilerplate.test$request_uri;
}

server {
    listen 80;
    listen [::]:80;

    server_name wp-boilerplate.test;

    root /var/www/nginx_sites/wp-boilerplate.test/public;
    index index.php index.html;
    charset utf-8;

    client_max_body_size 64m;

    access_log /var/www/nginx_sites/wp-boilerplate.test/log/access.log;
    error_log  /var/www/nginx_sites/wp-boilerplate.test/log/error.log;

    #
    # Main WordPress front controller.
    #
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    #
    # Optional Yoast SEO XML sitemap rewrites.
    #
    # Uncomment this block only when Yoast SEO is installed and sitemap pretty
    # permalinks are not resolving correctly under Nginx.
    #
    # Quick test:
    #
    #   Works:
    #     http://wp-boilerplate.test/?sitemap=1
    #
    #   Broken:
    #     http://wp-boilerplate.test/sitemap_index.xml
    #
    # If that is the case, enable this block.
    #
    # Basic Yoast sitemap URLs:
    #
    #   /sitemap_index.xml
    #   /post-sitemap.xml
    #   /page-sitemap.xml
    #   /category-sitemap.xml
    #
    # The /sitemap.xml redirect is optional convenience behavior. Yoast's
    # canonical sitemap index URL is /sitemap_index.xml.
    #
    # location ~ ([^/]*)sitemap(.*)\.x(m|s)l$ {
    #
    #     # Optional convenience redirect:
    #     # /sitemap.xml -> /sitemap_index.xml
    #     rewrite ^/sitemap\.xml$ /sitemap_index.xml permanent;
    #
    #     # Yoast sitemap XSL stylesheet:
    #     # /sitemap.xsl -> /index.php?xsl=1
    #     rewrite ^/sitemap\.xsl$ /index.php?xsl=1 last;
    #
    #     # Yoast sitemap index:
    #     # /sitemap_index.xml -> /index.php?sitemap=1
    #     rewrite ^/sitemap_index\.xml$ /index.php?sitemap=1 last;
    #
    #     # Yoast individual sitemap files:
    #     # /post-sitemap.xml       -> /index.php?sitemap=post
    #     # /post-sitemap2.xml      -> /index.php?sitemap=post&sitemap_n=2
    #     # /page-sitemap.xml       -> /index.php?sitemap=page
    #     # /category-sitemap.xml   -> /index.php?sitemap=category
    #     rewrite ^/([^/]+?)-sitemap([0-9]+)?\.xml$ /index.php?sitemap=$1&sitemap_n=$2 last;
    #
    #     # Yoast News SEO extension, if installed:
    #     # rewrite ^/news-sitemap\.xml$ /index.php?sitemap=wpseo_news last;
    #
    #     # Yoast Local SEO extension, if installed:
    #     # rewrite ^/locations\.kml$ /index.php?sitemap=wpseo_local_kml last;
    #     # rewrite ^/geo-sitemap\.xml$ /index.php?sitemap=wpseo_local last;
    #
    #     # Yoast Video SEO extension, if installed:
    #     # rewrite ^/video-sitemap\.xsl$ /index.php?xsl=video last;
    #
    #     access_log off;
    # }

    #
    # Block PHP execution from uploads.
    #
    location ~* ^/content/uploads/.*\.php$ {
        deny all;
    }

    #
    # Protect hidden files, except ACME / Let's Encrypt challenges.
    #
    location ~ /\.(?!well-known) {
        deny all;
    }

    #
    # Deny direct access to sensitive project files if they are ever exposed.
    #
    location ~* /(composer(\..*)?\.json|composer\.lock|package(-lock)?\.json|vite\.config\.(mjs|js)|wp_config(\.sample)?\.php|README\.md|readme\.md)$ {
        deny all;
    }

    #
    # Static assets.
    #
    # Theme repositories intentionally commit built dist assets, so those files
    # should be served directly with long-lived cache headers.
    #
    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|webp|avif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    #
    # PHP-FPM.
    #
    location ~ \.php$ {
        try_files $uri =404;

        include fastcgi_params;
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS $https if_not_empty;

        # Adjust for your PHP-FPM version/socket.
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }
}
